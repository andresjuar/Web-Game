<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RicoQuiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #f2ecd8;
        --black: #1a1a1a;
        --purple: #6b2fa0;
        --purple-light: #8b3fcc;
        --green: #1a8c3c;
        --green-light: #22b84e;
        --yellow: #f5c400;
        --white: #ffffff;
        --border: 4px solid var(--black);
        --shadow: 5px 5px 0px var(--black);
        --shadow-lg: 8px 8px 0px var(--black);
        --radius: 16px;
        --radius-sm: 4px; /* Para los botones más cuadrados */
      }

      body {
        font-family: "Nunito", sans-serif;
        background-color: var(--purple);
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.07) 1.5px,
          transparent 1.5px
        );
        background-size: 30px 30px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
      }

      .container {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
        position: relative;
      }

      /* LOGO DEL PROTOTIPO ORIGINAL */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        animation: floatLogo 3.5s ease-in-out infinite;
      }

      @keyframes floatLogo {
        0%,
        100% {
          transform: translateY(0px) rotate(-1.5deg);
        }
        50% {
          transform: translateY(-14px) rotate(1.5deg);
        }
      }

      .logo-badge {
        background: var(--yellow);
        border: var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
        padding: 0.5rem 2.2rem 0.7rem;
      }

      .logo-text {
        font-family: "Fredoka One", cursive;
        font-size: 4.8rem;
        line-height: 1;
        color: var(--black);
      }

      .logo-text span {
        color: var(--purple);
      }

      .logo-sub {
        font-size: 0.85rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.8);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* NUEVOS BOTONES (CARDS) */
      .cards {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }

      .card {
        border: var(--border);
        background: var(--white);
        display: flex;
        flex-direction: column;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        overflow: hidden;
        border-radius: var(--radius-sm);
      }

      .card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 var(--black);
      }
      .card:active {
        transform: translate(4px, 4px);
        box-shadow: 2px 2px 0 var(--black);
      }

      .card-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* Usamos un morado más claro para que no se pierda con el fondo */
      .card--create .card-content {
        background-color: var(--purple-light);
      }
      .card--join .card-content {
        background-color: var(--green-light);
      }

      .card-title {
        font-family: "Fredoka One", cursive;
        font-size: 1.8rem;
        color: var(--white);
        line-height: 1.1;
        text-transform: uppercase;
      }

      .card-desc {
        font-size: 0.85rem;
        color: var(--white);
        font-weight: 700;
        line-height: 1.3;
      }

      .card-footer {
        background-color: var(--black);
        padding: 0.8rem 1.5rem;
        display: flex;
        justify-content: flex-start;
        align-items: center;
      }

      .card-arrow {
        color: var(--white);
        font-size: 1.8rem;
        font-weight: 900;
        line-height: 1;
      }

      /* NUEVO PANEL DE UNIRSE ADAPTADO */
      .join-panel {
        display: none;
        width: 100%;
        background: var(--cream);
        border: var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 2rem;
        flex-direction: column;
        gap: 1.5rem;
        animation: popIn 0.2s ease;
      }

      .join-panel.visible {
        display: flex;
      }

      @keyframes popIn {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .join-label {
        font-family: "Fredoka One", cursive;
        font-size: 1.3rem;
        color: var(--black);
        text-align: center;
        text-transform: uppercase;
      }

      .code-inputs {
        display: flex;
        gap: 0.8rem;
        justify-content: center;
      }

      .code-inputs input {
        width: 60px;
        height: 70px;
        background: var(--white);
        border: var(--border);
        border-radius: var(--radius-sm);
        color: var(--black);
        font-family: "Fredoka One", cursive;
        font-size: 2.5rem;
        text-align: center;
        outline: none;
        text-transform: uppercase;
        box-shadow: 4px 4px 0 var(--black);
        transition: transform 0.1s;
      }

      .code-inputs input:focus {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--purple);
        border-color: var(--purple);
      }

      .name-input-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .name-input-container label {
        font-family: "Fredoka One", cursive;
        color: var(--black);
        font-size: 1.1rem;
      }

      .name-input-container input {
        width: 100%;
        padding: 1rem;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 1.1rem;
        background-color: var(--white);
        color: var(--black);
        border: var(--border);
        border-radius: var(--radius-sm);
        outline: none;
        box-shadow: 4px 4px 0 var(--black);
      }

      .name-input-container input:focus {
        box-shadow: 6px 6px 0 var(--purple);
        border-color: var(--purple);
      }

      .btn-continuar {
        width: 100%;
        padding: 1rem;
        background: var(--green-light);
        border: var(--border);
        color: var(--white);
        font-family: "Fredoka One", cursive;
        font-size: 1.4rem;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--black);
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: var(--radius-sm);
      }

      .btn-continuar:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--black);
      }
      .btn-continuar:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--black);
      }

      /* TIP DEL PROTOTIPO ORIGINAL */
      .tip {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 0.7rem 1rem;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.75);
        font-weight: 700;
        text-align: center;
      }

      .tip strong {
        color: var(--yellow);
      }

      /* MASCOTA DECORATIVA */
      .mascot-bg {
        position: fixed;
        bottom: -30px;
        right: -20px;
        font-size: 9rem;
        opacity: 0.1;
        pointer-events: none;
        animation: mascotFloat 5s ease-in-out infinite;
      }

      @media (max-width: 500px) {
        .cards {
          grid-template-columns: 1fr;
        }
        .logo-text {
          font-size: 3.5rem;
        }
      }
    </style>
  </head>
  <body>
    <span class="mascot-bg">🐙</span>

    <div class="container">
      <div class="logo-wrap">
        <div class="logo-badge">
          <div class="logo-text">RICO<span>QUIZ</span></div>
        </div>
        <p class="logo-sub">Play live with friends</p>
      </div>

      <div class="cards">
        <div class="card card--create" id="btn-create">
          <div class="card-content">
            <div class="card-title">CREATE ROOM</div>
            <p class="card-desc">
              Create your own room and share the code with your friends.
            </p>
          </div>
          <div class="card-footer">
            <span class="card-arrow">➔</span>
          </div>
        </div>

        <div class="card card--join" onclick="toggleJoin()">
          <div class="card-content">
            <div class="card-title">JOIN ROOM</div>
            <p class="card-desc">Enter a room code to join the game.</p>
          </div>
          <div class="card-footer">
            <span class="card-arrow">➔</span>
          </div>
        </div>
      </div>

      <div class="join-panel" id="joinPanel">
        <p class="join-label">Enter the 4-letter code</p>

        <div class="code-inputs">
          <input
            type="text"
            maxlength="1"
            id="c1"
            oninput="nextInput(this, 'c2')"
          />
          <input
            type="text"
            maxlength="1"
            id="c2"
            oninput="nextInput(this, 'c3')"
          />
          <input
            type="text"
            maxlength="1"
            id="c3"
            oninput="nextInput(this, 'c4')"
          />
          <input type="text" maxlength="1" id="c4" oninput="checkCode(this)" />
        </div>
        <!-- 
      <div class="name-input-container">
        <label for="playerName">What's your name?</label>
        <input type="text" id="playerName" placeholder="Escribe tu nombre aquí..." />
      </div> -->

        <button class="btn-continuar" onclick="goJoin()">
          Continue <span>➔</span>
        </button>
      </div>

      <div class="tip">
        <strong>TIP:</strong> You can also join from
        <strong>ricoquiz.app</strong> with the 4-letter code
      </div>
    </div>

    <script>
      function toggleJoin() {
        const p = document.getElementById("joinPanel");
        p.classList.toggle("visible");
        if (p.classList.contains("visible")) {
          document.getElementById("c1").focus();
          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth",
          });
        }
      }

      function nextInput(cur, nextId) {
        if (cur.value.length >= 1) {
          const n = document.getElementById(nextId);
          if (n) n.focus();
        }
      }

      function checkCode(cur) {
        if (cur.value.length >= 1) {
          document.getElementById("playerName").focus();
        }
      }

      function goJoin() {
        const code = ["c1", "c2", "c3", "c4"]
          .map((id) => document.getElementById(id).value)
          .join("")
          .toUpperCase();

        if (code.length < 4) {
          alert("Por favor, ingresa las 4 letras del código.");
          return;
        }

        // Solo guardamos el código, todavía no conectamos
        sessionStorage.setItem("roomCode", code);
        window.location.href = "/player/player-setup.html";
      }
    </script>
    <script>
      // this line is added in order to kill a room if the host goes back to the main page
      sessionStorage.clear();
    </script>
    <script src="/js/wsClient.js"></script>
    <script src="/js/start.js"></script>

  </body>
</html>
