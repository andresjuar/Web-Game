<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RicoQuiz - Waiting for Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:         #EAE0C8;
      --black:         #111111;
      --purple:        #6C35A6;
      --yellow:        #F5C400;
      --white:         #FFFFFF;
      --green:         #389854;
      --border:        4px solid var(--black);
      --shadow:        6px 6px 0px var(--black);
      --radius:        16px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--black);
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .mobile-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      background-color: var(--cream);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* HEADER */
    .header {
      background-color: var(--purple);
      padding: 1.2rem;
      border-bottom: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
    }

    .logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      line-height: 1;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -1px;
      background: var(--yellow);
      padding: 0.4rem 1.2rem;
      border: 3px solid var(--black);
      border-radius: 12px;
      box-shadow: 3px 3px 0px var(--black);
      transform: rotate(-2deg);
    }

    .logo-text span { color: var(--purple); }

    /* CONTENIDO CENTRAL */
    .content {
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 2rem;
      text-align: center;
    }

    /* TARJETA DE ESPERA */
    .waiting-card {
      width: 100%;
      background-color: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      padding: 3rem 1.5rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .waiting-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      color: var(--black);
      line-height: 1.2;
      text-transform: uppercase;
    }

    /* ANIMACIÓN DE PUNTOS */
    .dots-container {
      display: flex;
      gap: 8px;
      margin-top: 0.5rem;
    }

    .dot {
      width: 18px;
      height: 18px;
      background-color: var(--purple);
      border: 2px solid var(--black);
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    .sub-text {
      font-weight: 800;
      color: var(--purple);
      font-size: 1.1rem;
      opacity: 0.8;
    }

    /* DECORACIÓN INFERIOR */
    .footer-note {
      background-color: var(--yellow);
      border: var(--border);
      padding: 0.8rem 1.5rem;
      border-radius: 5px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      box-shadow: 4px 4px 0px var(--black);
    }

  </style>
</head>
<body>

  <div class="mobile-container">
    
    <div class="header">
      <div class="logo-text">RICO<span>QUIZ</span></div>
    </div>

    <div class="content">

      <div class="waiting-card">
        <h1 class="waiting-title">Waiting for host</h1>
        
        <div class="dots-container">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <p class="sub-text">The game will start soon!</p>
      </div>

      <div class="footer-note">
        GET READY! 🚀
      </div>

    </div>
  </div>

</body>
</html>
