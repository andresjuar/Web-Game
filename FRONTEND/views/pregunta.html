<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizLive – Question (Host)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #EAE0C8;
      --black:     #111111;
      --purple:    #6B2FA0;
      --yellow:    #F5C400;
      --white:     #FFFFFF;
      --opt-a:     #C4281A;
      --opt-b:     #1A8C3C;
      --opt-c:     #1A5FA0;
      --opt-d:     #D4820A;
      --border:    4px solid var(--black);
      --shadow:    5px 5px 0px var(--black);
      --shadow-lg: 8px 8px 0px var(--black);
      --radius:    16px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--purple);
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: clamp(1rem, 3vh, 2rem) 1rem;
    }

    .page { 
      display: flex; 
      flex-direction: column; 
      gap: clamp(0.5rem, 2vh, 1.2rem); 
      max-width: 800px; 
      width: 100%; 
      margin: 0 auto;
      height: 100%;
      justify-content: center;
    }

    /* ════════ TOP BAR ════════ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .progress-badge {
      background: rgba(0,0,0,0.25);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 99px;
      padding: clamp(0.2rem, 1vh, 0.4rem) clamp(0.8rem, 2vw, 1.2rem);
      font-size: clamp(0.8rem, 2vh, 1rem);
      font-weight: 800;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .timer-badge {
      background: var(--yellow);
      border: 3px solid var(--black);
      border-radius: 12px;
      padding: clamp(0.1rem, 0.5vh, 0.2rem) clamp(0.6rem, 1.5vw, 1rem);
      box-shadow: 3px 3px 0 var(--black);
    }

    .timer-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 4vh, 2.2rem);
      color: var(--black);
      line-height: 1;
    }

    .timer-badge.urgent { background: var(--opt-a); }
    .timer-badge.urgent .timer-text { color: var(--white); animation: pulse 0.7s ease-in-out infinite; }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* ════════ PROGRESS BAR ════════ */
    .bar-wrap {
      background: rgba(0,0,0,0.25);
      border: 3px solid var(--black);
      border-radius: 99px;
      height: clamp(10px, 2vh, 16px);
      overflow: hidden;
      box-shadow: 3px 3px 0 var(--black);
      flex-shrink: 0;
    }

    .bar-fill {
      height: 100%;
      background: var(--yellow);
      border-radius: 99px;
      transition: width 1s linear, background 0.4s;
    }

    .bar-fill.urgent { background: var(--opt-a); }

    /* ════════ QUESTION ════════ */
    .question-card {
      background: var(--cream);
      border: var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 3vh, 2rem) clamp(1rem, 3vw, 1.5rem);
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 4vh, 2.5rem);
      color: var(--black);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    /* ════════ OPTIONS ════════ */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.5rem, 1.5vh, 1rem);
      flex-shrink: 1;
    }

    .option {
      border: var(--border);
      border-radius: var(--radius);
      padding: clamp(0.8rem, 2vh, 1.2rem) clamp(0.8rem, 2vw, 1rem);
      display: flex;
      align-items: center;
      gap: 0.85rem;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1rem, 2.5vh, 1.4rem);
      font-weight: 800;
      color: var(--white);
      box-shadow: var(--shadow);
      text-align: left;
    }

    .option-a { background: var(--opt-a); }
    .option-b { background: var(--opt-b); }
    .option-c { background: var(--opt-c); }
    .option-d { background: var(--opt-d); }

    .option.correct {
      box-shadow: 0 0 0 4px var(--yellow), 6px 6px 0 var(--black);
      transform: translate(-2px, -2px);
      z-index: 10;
    }

    .option.wrong {
      opacity: 0.35;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
      filter: grayscale(40%);
    }

    .option-letter {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3vh, 1.5rem);
      width: clamp(32px, 6vh, 40px);
      height: clamp(32px, 6vh, 40px);
      min-width: clamp(32px, 6vh, 40px);
      background: rgba(0,0,0,0.25);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .option-label { flex: 1; line-height: 1.3; }

    /* ════════ RESPONSES RECEIVED ════════ */
    .responses-bar {
      background: var(--cream);
      border: var(--border);
      border-radius: 12px;
      padding: clamp(0.5rem, 1.5vh, 0.8rem) clamp(1rem, 2vw, 1.5rem);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .resp-label {
      font-size: clamp(0.8rem, 2vh, 1rem);
      font-weight: 900;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .resp-count {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 3.5vh, 1.8rem);
      color: var(--purple);
    }

    /* ════════ ACTION BUTTONS ════════ */
    .btn-action {
      width: 100%;
      padding: clamp(0.8rem, 2.5vh, 1.2rem);
      border: var(--border);
      border-radius: var(--radius);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3vh, 1.6rem);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .btn-action:hover  { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
    .btn-action:active { transform: translate(4px,4px);   box-shadow: 2px 2px 0 var(--black); }

    .btn-reveal { background: var(--yellow); color: var(--black); }
    
    .btn-next { 
      background: var(--purple); 
      color: var(--white); 
      display: none; 
      text-shadow: 2px 2px 0 rgba(0,0,0,0.4); 
    }
    
    .btn-next.visible { display: flex; }
  </style>
</head>
<body>
  <div class="page">

    <div class="top-bar">
      <span class="progress-badge">Question 3 of 8</span>
      <div class="timer-badge" id="timerBadge">
        <div class="timer-text" id="timerText">0:15</div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="bar-fill" id="barFill" style="width:100%;"></div>
    </div>

    <div class="question-card">
      <p class="question-text">What is the capital of Japan?</p>
    </div>

    <div class="options" id="optGrid">
      <div class="option option-a" id="optA">
        <span class="option-letter">A</span>
        <span class="option-label">Beijing</span>
      </div>
      <div class="option option-b" id="optB">
        <span class="option-letter">B</span>
        <span class="option-label">Tokyo</span>
      </div>
      <div class="option option-c" id="optC">
        <span class="option-letter">C</span>
        <span class="option-label">Seoul</span>
      </div>
      <div class="option option-d" id="optD">
        <span class="option-letter">D</span>
        <span class="option-label">Bangkok</span>
      </div>
    </div>

    <div class="responses-bar">
      <span class="resp-label">Responses received</span>
      <span class="resp-count" id="respCount">3 / 4</span>
    </div>

    <button class="btn-action btn-reveal" id="btnReveal" onclick="forceReveal()">Reveal answer</button>
    <a href="results.html" class="btn-action btn-next" id="btnNext">Next →</a>

  </div>

  <script>
    let total = 15, rem = 15, revealed = false, iv;

    const timerText  = document.getElementById('timerText');
    const timerBadge = document.getElementById('timerBadge');
    const barFill    = document.getElementById('barFill');
    const btnReveal  = document.getElementById('btnReveal');
    const btnNext    = document.getElementById('btnNext');

    iv = setInterval(() => {
      rem--;
      timerText.textContent = '0:' + String(rem).padStart(2,'0');
      barFill.style.width = (rem / total * 100) + '%';
      if (rem <= 5) { timerBadge.classList.add('urgent'); barFill.classList.add('urgent'); }
      if (rem <= 0) { clearInterval(iv); if (!revealed) forceReveal(); }
    }, 1000);

    function forceReveal() {
      if (revealed) return;
      revealed = true;
      clearInterval(iv);
      
      // Correct answer is B (Tokyo)
      const correctBtn = document.getElementById('optB');
      
      document.querySelectorAll('.option').forEach(o => {
        o.classList.add('wrong');
      });
      
      if (correctBtn) { 
        correctBtn.classList.remove('wrong'); 
        correctBtn.classList.add('correct'); 
      }
      
      btnReveal.style.display = 'none';
      btnNext.classList.add('visible');
    }
  </script>
</body>
</html>
