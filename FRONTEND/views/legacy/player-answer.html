<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RicoQuiz - Player answer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #EAE0C8;
      --black:        #111111;
      --purple:       #6C35A6;
      --yellow:       #F5C400;
      --white:        #FFFFFF;
      --opt-a:        #C4281A;
      --opt-b:        #389854;
      --opt-c:        #1A5FA0;
      --opt-d:        #D4820A;
      --border:       4px solid var(--black);
      --shadow:       4px 4px 0px var(--black);
      --radius:       8px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--black);
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .mobile-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      background-color: var(--cream);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .header {
      background-color: var(--purple);
      padding: clamp(0.8rem, 2vh, 1.2rem);
      border-bottom: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
    }

    .logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 4vh, 2rem);
      line-height: 1;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -1px;
      background: var(--yellow);
      padding: 0.3rem 1rem;
      border: 3px solid var(--black);
      border-radius: 12px;
      box-shadow: 3px 3px 0px var(--black);
      transform: rotate(-2deg);
    }

    .logo-text span { 
      color: var(--purple); 
    }

    .content {
      padding: clamp(1rem, 3vh, 1.5rem);
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: clamp(0.8rem, 2vh, 1.2rem);
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .progress-badge {
      background: var(--black);
      color: var(--white);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.8rem, 2vh, 0.9rem);
      padding: 0.3rem 0.8rem;
      border-radius: 99px;
      text-transform: uppercase;
    }

    .timer-badge {
      background: var(--yellow);
      border: 3px solid var(--black);
      border-radius: 12px;
      padding: 0.1rem 0.6rem;
      box-shadow: 2px 2px 0 var(--black);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3vh, 1.5rem);
      color: var(--black);
    }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3.5vh, 1.5rem);
      color: var(--black);
      text-align: center;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: clamp(0.5rem, 1.5vh, 0.8rem);
      width: 100%;
      flex-grow: 1; 
      max-height: 45vh; 
      min-height: 150px;
    }

    .option-btn {
      display: flex;
      flex-direction: column;
      border: var(--border);
      border-radius: var(--radius);
      background-color: var(--white);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, filter 0.2s, opacity 0.2s;
      overflow: hidden;
      padding: 0;
      outline: none;
      min-height: 0; /* Necesario para que funcione bien en flex/grid */
    }

    .option-btn:active:not(.disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }

    .opt-letter {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3vh, 1.5rem);
      padding: clamp(0.3rem, 1vh, 0.5rem);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .opt-text {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.95rem, 2.5vh, 1.1rem);
      font-weight: 900;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.4rem, 1.5vh, 0.8rem);
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
    }

    .btn-a .opt-text { background-color: var(--opt-a); }
    .btn-b .opt-text { background-color: var(--opt-b); }
    .btn-c .opt-text { background-color: var(--opt-c); }
    .btn-d .opt-text { background-color: var(--opt-d); }

    .option-btn.disabled { pointer-events: none; }

    .option-btn.dimmed {
      opacity: 0.4;
      filter: grayscale(80%);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }

    .option-btn.selected {
      box-shadow: 0 0 0 4px var(--yellow), 4px 4px 0 var(--black);
      transform: translate(-2px, -2px);
    }

    .waiting-message {
      visibility: hidden;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: auto; 
      padding-bottom: clamp(0.5rem, 2vh, 1rem); 
      transition: opacity 0.3s ease;
      flex-shrink: 0; 
    }

    .waiting-message.visible {
      visibility: visible;
      opacity: 1;
    }

    .waiting-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 2.5vh, 1.3rem);
      color: var(--black);
      text-transform: uppercase;
      text-align: center;
    }

    .loader {
      display: flex;
      gap: 5px;
    }
    
    .loader div {
      width: clamp(8px, 2vh, 10px);
      height: clamp(8px, 2vh, 10px);
      background: var(--purple);
      border-radius: 50%;
      animation: bounce 0.5s alternate infinite ease;
    }
    .loader div:nth-child(2) { animation-delay: 0.15s; }
    .loader div:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

  </style>
</head>
<body>

  <div class="mobile-container">
    
    <div class="header">
      <div class="logo-text">RICO<span>QUIZ</span></div>
    </div>

    <div class="content">
      
      <div class="top-bar">
        <div class="progress-badge">3 of 8</div>
        <div class="timer-badge">0:15</div>
      </div>

      <div class="question-text">What is the capital of Japan?</div>

      <div class="options-grid">
        
        <button class="option-btn btn-a" onclick="selectAnswer(this)">
          <div class="opt-letter">A</div>
          <div class="opt-text">Pekín</div>
        </button>

        <button class="option-btn btn-b" onclick="selectAnswer(this)">
          <div class="opt-letter">B</div>
          <div class="opt-text">Tokyo</div>
        </button>

        <button class="option-btn btn-c" onclick="selectAnswer(this)">
          <div class="opt-letter">C</div>
          <div class="opt-text">Seoul</div>
        </button>

        <button class="option-btn btn-d" onclick="selectAnswer(this)">
          <div class="opt-letter">D</div>
          <div class="opt-text">Bangkok</div>
        </button>

      </div>

      <div class="waiting-message" id="waitingMessage">
        <div class="waiting-text">Wait for the others...</div>
        <div class="loader">
          <div></div><div></div><div></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function selectAnswer(selectedBtn) {
      const allButtons = document.querySelectorAll('.option-btn');
      
      allButtons.forEach(btn => {
        btn.classList.add('disabled');
        if (btn === selectedBtn) {
          btn.classList.add('selected');
        } else {
          btn.classList.add('dimmed');
        }
      });

      document.getElementById('waitingMessage').classList.add('visible');
    }
  </script>
</body>
</html>
