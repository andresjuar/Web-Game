<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RicoQuiz - Player Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #EAE0C8;
      --black:        #111111;
      --purple:       #6C35A6;
      --yellow:       #F5C400;
      --white:        #FFFFFF;
      --green:        #389854;
      --border:       4px solid var(--black);
      --shadow:       6px 6px 0px var(--black);
      --radius:       16px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--black);
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .mobile-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      background-color: var(--cream);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* ════════ HEADER MORADO (CON PUNTOS) ════════ */
    .header {
      background-color: var(--purple);
      padding: 1.2rem;
      border-bottom: var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
    }

    .logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      line-height: 1;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: -1px;
      background: var(--yellow);
      padding: 0.4rem 1.2rem;
      border: 3px solid var(--black);
      border-radius: 12px;
      box-shadow: 3px 3px 0px var(--black);
      transform: rotate(-2deg);
    }

    .logo-text span { color: var(--purple); }

    /* ════════ CONTENIDO ════════ */
    .content {
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 2rem;
      text-align: center;
    }

    /* TARJETA DE PUESTO (RANKING) */
    .rank-card {
      width: 100%;
      background-color: var(--white);
      border: var(--border);
      border-radius: var(--radius);
      padding: 2rem 1rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      position: relative;
    }

    .rank-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rank-number {
      font-family: 'Fredoka One', cursive;
      font-size: 5rem;
      color: var(--black);
      line-height: 1;
    }

    .rank-suffix {
      font-size: 2rem;
      vertical-align: super;
    }

    /* TARJETA DE PUNTOS */
    .score-card {
      width: 100%;
      background-color: var(--purple);
      border: var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--white);
    }

    .score-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      text-transform: uppercase;
    }

    .score-value {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5rem;
      color: var(--yellow);
    }

    /* MENSAJE INFERIOR */
    .footer-msg {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .waiting-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--black);
      text-transform: uppercase;
    }

    /* Animación de carga */
    .loader {
      display: flex;
      gap: 6px;
    }
    
    .loader div {
      width: 12px;
      height: 12px;
      background: var(--purple);
      border-radius: 50%;
      animation: bounce 0.6s alternate infinite ease-in-out;
    }
    .loader div:nth-child(2) { animation-delay: 0.2s; }
    .loader div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(0.6); opacity: 0.4; }
    }

  </style>
</head>
<body>

  <div class="mobile-container">
    
    <div class="header">
      <div class="logo-text">RICO<span>QUIZ</span></div>
    </div>

    <div class="content">

      <div class="rank-card">
        <span class="rank-label">Your current place</span>
        <div class="rank-number">2<span class="rank-suffix">º</span></div>
        <span class="rank-label" style="color: var(--black); opacity: 0.6;">PLACE</span>
      </div>

      <div class="score-card">
        <span class="score-label">Points</span>
        <span class="score-value">6900</span>
      </div>

      <div class="footer-msg">
        <p class="waiting-text">Waiting for the next round</p>
        <div class="loader">
          <div></div><div></div><div></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
