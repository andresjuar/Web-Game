<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RicoQuiz – Host Room</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --cream:        #EAE0C8;
                --black:        #111111;
                --purple:       #6C35A6;
                --green:        #389854;
                --white:        #FFFFFF;
                --border:       4px solid var(--black);
                --shadow:       6px 6px 0px var(--black);
                --radius:       4px;
            }

            body {
                font-family: 'Nunito', sans-serif;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ════════ TOP HALF ════════ */
            .top-half {
                background-color: var(--purple);
                color: var(--white);
                padding: clamp(1rem, 3vh, 3rem) clamp(2rem, 5vw, 4rem);
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 50vh;
                border-bottom: var(--border);
                background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
                background-size: 30px 30px;
            }

            .code-section {
                display: flex;
                flex-direction: column;
                gap: clamp(0.2rem, 1vh, 0.5rem);
            }

            .code-label {
                font-family: 'Nunito', sans-serif;
                font-size: clamp(1rem, 2.5vh, 1.5rem);
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 2px;
            }

            .code-display {
                font-family: 'Fredoka One', cursive;
                font-size: clamp(4rem, 16vh, 9rem);
                line-height: 0.8;
                color: var(--white);
                letter-spacing: 5px;
                text-shadow: 8px 8px 0px var(--black);
            }

            .join-section {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: clamp(0.5rem, 1.5vh, 1rem);
            }

            .join-label {
                font-size: clamp(0.9rem, 2vh, 1.1rem);
                font-weight: 800;
            }

            .link-box {
                background: var(--black);
                padding: clamp(0.3rem, 1vh, 0.5rem);
                display: flex;
                align-items: center;
                gap: clamp(0.5rem, 1vw, 1rem);
                border: 2px solid var(--black);
            }

            .link-box span {
                font-family: 'Nunito', sans-serif;
                font-weight: 800;
                font-size: clamp(0.9rem, 2vh, 1.2rem);
                color: var(--white);
                padding-left: 0.5rem;
            }

            .btn-copy-icon {
               
                border: 2px solid var(--black);
                font-size: clamp(1rem, 2vh, 1.2rem);
                padding: 0.3rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .qr-placeholder {
                width: clamp(80px, 15vh, 120px);
                height: clamp(80px, 15vh, 120px);
                background-color: var(--white);
                border: var(--border);
                box-shadow: var(--shadow);
                padding: 5px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .qr-pattern {
                width: 100%;
                height: 100%;
                background: 
                    linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), 
                    linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
                background-size: 20px 20px;
                background-position: 0 0, 10px 10px;
                border: 2px solid #111;
            }

            /* ════════ BOTTOM HALF ════════ */
            .bottom-half {
                background-color: var(--cream);
                padding: clamp(1.5rem, 4vh, 3rem) clamp(2rem, 5vw, 4rem);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 50vh;
            }

            .players-title {
                font-family: 'Fredoka One', cursive;
                font-size: clamp(1.2rem, 3vh, 1.8rem);
                color: var(--black);
                text-transform: uppercase;
                margin-bottom: clamp(1rem, 2.5vh, 2rem);
            }

            .players-grid {
                display: flex;
                gap: clamp(1.5rem, 5vw, 4rem);
                align-items: center;
                justify-content: center;
                flex-wrap: wrap;
            }

            .player-chip {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }

            .player-avatar {
                width: clamp(70px, 12vh, 100px);
                height: clamp(70px, 12vh, 100px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: clamp(2.5rem, 5vh, 3.5rem);
                background-color: var(--white);
                border: 4px solid var(--black); 
                border-radius: 50%;
                box-shadow: 6px 6px 0px var(--black); 
            }

            .player-name {
                font-family: 'Fredoka One', cursive;
                font-size: clamp(0.9rem, 2vh, 1.2rem);
                color: var(--black);
                text-transform: uppercase;
            }

            .bg-blue { background-color: #4A90E2; }
            .bg-yellow { background-color: #F5C400; }
            .bg-red { background-color: #D0021B; }
            .bg-green { background-color: #7ED321; }

            /* BOTTOM CONTROLS */
            .bottom-controls {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                margin-top: auto;
                padding-top: 1rem;
            }

            .btn-config {
                background: var(--cream);
                border: var(--border);
                padding: clamp(0.6rem, 1.5vh, 1rem) clamp(1rem, 2vw, 1.5rem);
                font-family: 'Fredoka One', cursive;
                font-size: clamp(0.9rem, 2vh, 1.2rem);
                color: var(--black);
                cursor: pointer;
                box-shadow: 4px 4px 0 var(--black);
                display: flex;
                align-items: center;
                gap: 0.5rem;
                transition: transform 0.1s;
            }
            .btn-config:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--black); }

            .btn-start {
                background: var(--white);
                border: var(--border);
                padding: clamp(0.8rem, 2vh, 1.2rem) clamp(1.5rem, 3vw, 2.5rem);
                font-family: 'Fredoka One', cursive;
                font-size: clamp(1rem, 2.5vh, 1.5rem);
                color: var(--black);
                cursor: pointer;
                box-shadow: 6px 6px 0 var(--black);
                display: flex;
                align-items: center;
                gap: 0.5rem;
                transition: transform 0.1s, box-shadow 0.1s;
            }
            .btn-start:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--black); }
            .btn-start:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--black); }

            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(17, 17, 17, 0.8);
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1rem;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            .modal-overlay.open { opacity: 1; pointer-events: all; }
            .modal {
                background: var(--cream);
                border: var(--border);
                width: 100%;
                max-width: 500px;
                padding: clamp(1.5rem, 4vh, 2rem);
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                box-shadow: 10px 10px 0 var(--black);
                transform: scale(0.95);
                transition: transform 0.2s;
            }
            .modal-overlay.open .modal { transform: scale(1); }
            .modal-header { display: flex; align-items: center; justify-content: space-between; }
            .modal-title { font-family: 'Fredoka One', cursive; font-size: 1.5rem; text-transform: uppercase; }
            .modal-close { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; }
            .modal-section { font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem; }
            .game-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
            .game-type {
                background: var(--white);
                border: var(--border);
                padding: 1rem 0.5rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
                cursor: pointer;
                box-shadow: 4px 4px 0 var(--black);
            }
            .game-type.selected { background: var(--purple); color: var(--white); transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--black); }
            .modal-input { width: 100%; padding: 1rem; border: var(--border); font-family: inherit; font-weight: 800; box-shadow: 4px 4px 0 var(--black); }
            .num-controls { display: flex; align-items: center; gap: 1rem; }
            .num-btn { width: 40px; height: 40px; background: var(--purple); border: var(--border); color: var(--white); font-size: 1.5rem; cursor: pointer; box-shadow: 3px 3px 0 var(--black); }
            .num-display { background: var(--white); border: var(--border); width: 60px; height: 40px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; box-shadow: 3px 3px 0 var(--black); }
            .modal-footer { display: flex; gap: 1rem; margin-top: 1rem; }
            .btn-cancel, .btn-save { flex: 1; padding: 1rem; font-family: 'Fredoka One', cursive; border: var(--border); cursor: pointer; box-shadow: 4px 4px 0 var(--black); }
            .btn-cancel { background: var(--white); }
            .btn-save { background: var(--purple); color: var(--white); }

            
        </style>
    </head>
    <body>

        <div class="top-half">
            <div class="code-section">
                <div class="code-label">ROOM CODE</div>
                <div class="code-display">ABCD</div>
            </div>
            
            <div class="join-section">
                <div class="join-label">Join Link</div>
                <div class="link-box">
                    <span>quizlive.app/join/ABCD</span>
                    <p class="btn-copy-icon">📋</p>
                </div>
                <div class="join-label" style="margin-top: 0.5rem;">Scan to Join</div>
                <div class="qr-placeholder">
                    <div class="qr-pattern"></div>
                </div>
            </div>
        </div>

        <div class="bottom-half">
            <div>
                <div class="players-title">PLAYERS (4/10)</div>
                <div class="players-grid">
                    <div class="player-chip">
                        <div class="player-avatar bg-blue">👦🏽</div>
                        <div class="player-name">LUIS</div>
                    </div>
                    <div class="player-chip">
                        <div class="player-avatar bg-yellow">👩🏻</div>
                        <div class="player-name">MARI</div>
                    </div>
                    <div class="player-chip">
                        <div class="player-avatar bg-red">🧔🏻‍♂️</div>
                        <div class="player-name">DIEGO</div>
                    </div>
                    <div class="player-chip">
                        <div class="player-avatar bg-green">👱🏼‍♀️</div>
                        <div class="player-name">SOFIA</div>
                    </div>
                </div>
            </div>

            <div class="bottom-controls">
                <button class="btn-config" onclick="openModal()">
                    ⚙ SETTINGS
                </button>
                <button class="btn-start" onclick="window.location='loading-host-page.html'">
                    START GAME ➔
                </button>
            </div>
        </div>

        <div class="modal-overlay" id="modal" onclick="handleOverlay(event)">
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title">SETTINGS</span>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div>
                    <p class="modal-section">GAME TYPE</p>
                    <div class="game-types">
                        <div class="game-type selected" onclick="selectType(this)">
                            <div class="gt-icon">🧠</div>
                            <div class="gt-name">AI TRIVIA</div>
                        </div>
                        <div class="game-type" onclick="selectType(this)">
                            <div class="gt-icon">📋</div>
                            <div class="gt-name">SAVED QUIZ</div>
                        </div>
                        <div class="game-type" onclick="selectType(this)">
                            <div class="gt-icon">🎭</div>
                            <div class="gt-name">LIAR GAME</div>
                        </div>
                    </div>
                </div>
                <div>
                    <p class="modal-section">TOPIC (FOR AI)</p>
                    <input class="modal-input" type="text" placeholder="e.g. History, Sports..." />
                </div>
                <div>
                    <p class="modal-section">NUMBER OF QUESTIONS</p>
                    <div class="num-controls">
                        <button class="num-btn" onclick="changeNum(-1)">−</button>
                        <div class="num-display" id="numVal">8</div>
                        <button class="num-btn" onclick="changeNum(1)">+</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                    <button class="btn-save" onclick="closeModal()">SAVE</button>
                </div>
            </div>
        </div>

        <script>
            function openModal()  { document.getElementById('modal').classList.add('open'); }
            function closeModal() { document.getElementById('modal').classList.remove('open'); }
            function handleOverlay(e) { if (e.target === document.getElementById('modal')) closeModal(); }
            function selectType(el) {
                document.querySelectorAll('.game-type').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
            }
            function changeNum(d) {
                const el = document.getElementById('numVal');
                el.textContent = Math.max(1, Math.min(12, parseInt(el.textContent) + d));
            }
        </script>
    </body>
</html>
